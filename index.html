<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>専修大学通学判定COM</title>

<link rel="icon" href="https://www.senshu-u.ac.jp/favicon.ico">

<style>

body{
    margin:0;
    font-family:sans-serif;
    background:#eef3f8;
    transition:0.3s;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

/* ボタン */
button{
    margin:5px;
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#1976d2;
    color:white;
}

/* 天気 */
.weather{
    background:linear-gradient(135deg,#4facfe,#00c6ff);
    color:white;
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
}

.temp{
    font-size:55px;
    font-weight:bold;
}

/* 自転車 */
.bike{
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

/* ⭐ 超重要：大学判定 */
.uni-box{
    margin-top:15px;
    padding:20px;
    border-radius:15px;
    background:rgba(0,0,0,0.2);
}

.uni-title{
    font-size:18px;
    opacity:0.9;
}

.uni-result{
    font-size:38px;
    font-weight:900;
    margin-top:5px;
}

/* 色分け */
.good{
    color:#00ff95;
}

.mid{
    color:#ffe066;
}

.bad{
    color:#ff4d4d;
}

/* グリッド */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.ok{color:green;font-weight:bold;}
.warn{color:red;font-weight:bold;}

/* ダーク */
.dark{
    background:#111;
    color:white;
}
.dark .card{
    background:#222;
    color:white;
}
.dark .weather{
    background:#333;
}

</style>
</head>

<body>

<div class="container">

<h1>🎓 専修大学通学判定COM</h1>

<button onclick="toggleDark()">🌓 ダーク</button>
<button onclick="refresh()">🔄 更新</button>
<button onclick="getLocation()">📍 現在地</button>

<div id="location">📍 未取得</div>

<div class="weather">

<h2>🌤 川崎の天気</h2>

<div id="weather">読み込み中...</div>

<div id="bike">🚴 判定中...</div>

<!-- ⭐ 超強調エリア -->
<div class="uni-box">

<div class="uni-title">🎓 専修大学に行くべきか</div>

<div id="uni" class="uni-result">判定中...</div>

</div>

</div>

<div class="grid">

<div class="card"><b>JR東日本</b><p class="ok">平常運転</p></div>
<div class="card"><b>京急</b><p class="ok">平常運転</p></div>
<div class="card"><b>東急</b><p class="warn">一部遅延</p></div>
<div class="card"><b>小田急</b><p class="ok">平常運転</p></div>
<div class="card"><b>京王</b><p class="ok">平常運転</p></div>

</div>

</div>

<script>

const lat = 35.5313;
const lon = 139.6969;

function fetchWeather(){

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=Asia%2FTokyo`)
.then(r=>r.json())
.then(data=>{

let w = data.current_weather;

// 天気
document.getElementById("weather").innerHTML =
`<div class="temp">${w.temperature}°C</div>
<p>風速: ${w.windspeed} km/h</p>`;

// 自転車
let bike="";

if(w.weathercode>=61){
bike="🚫 雨でNG";
}
else if(w.windspeed>25){
bike="💨 風強い";
}
else if(w.temperature>33){
bike="🥵 暑い";
}
else{
bike="🚴 OK";
}

document.getElementById("bike").innerHTML = bike;

// 🎓 通学判定（強化）
let score=0;

if(w.weathercode>=61) score-=2;
if(w.windspeed>25) score-=2;
if(w.temperature>33) score-=1;
if(w.temperature<5) score-=1;

let text="";
let cls="";

if(score>=2){
text="行くべき（最高コンディション）";
cls="good";
}
else if(score===1 || score===0){
text="迷う（様子見）";
cls="mid";
}
else{
text="行かない方がいい";
cls="bad";
}

document.getElementById("uni").className = "uni-result " + cls;
document.getElementById("uni").innerHTML = text;

});

}

setInterval(fetchWeather,60000);
fetchWeather();

// ダーク
function toggleDark(){
document.body.classList.toggle("dark");
}

// 更新
function refresh(){
fetchWeather();
}

// 現在地
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
document.getElementById("location").innerHTML =
`📍 ${pos.coords.latitude.toFixed(3)}, ${pos.coords.longitude.toFixed(3)}`;
});
}

</script>

</body>
</html>
