<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>専修大学AI通学ダッシュボード</title>

<link rel="icon" href="https://www.senshu-u.ac.jp/favicon.ico">

<style>

body{
    margin:0;
    font-family:sans-serif;
    background:#eef3f8;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

/* 天気 */
.weather{
    background:linear-gradient(135deg,#4facfe,#00c6ff);
    color:white;
    padding:25px;
    border-radius:20px;
}

/* AI判定 */
.ai-box{
    margin-top:15px;
    padding:20px;
    border-radius:15px;
    color:white;
}

.good{background:#00c853;}
.mid{background:#ffb300;}
.bad{background:#d50000;}

/* カード */
.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-top:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* 出席率 */
.attendance{
    font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h1>🎓 専修大学AI通学ダッシュボード</h1>

<!-- 天気 -->
<div class="weather">

<h2>🌤 川崎の天気</h2>

<div id="weather">読み込み中...</div>

</div>

<!-- AI判定 -->
<div id="ai" class="ai-box mid">
🤖 判定中...
</div>

<!-- 出席率 -->
<div class="card">
<h2>📊 出席率・単位リスク</h2>
<div id="attendance">計算中...</div>
</div>

</div>

<script>

const lat = 35.5313;
const lon = 139.6969;

/* 出席率（仮） */
let attendanceRate = 78;

/* 天気取得 */
function fetchWeather(){

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=Asia%2FTokyo`)
.then(r=>r.json())
.then(data=>{

let w = data.current_weather;

/* 表示 */
document.getElementById("weather").innerHTML =
`<b>${w.temperature}°C</b> / 風 ${w.windspeed} km/h`;

/* スコア */
let score = 0;
let reason = [];

/* 天気 */
if(w.weathercode>=61){
score -= 2;
reason.push("雨で移動が面倒");
}
if(w.windspeed>25){
score -= 2;
reason.push("風が強い");
}
if(w.temperature>33){
score -= 1;
reason.push("暑すぎる");
}
if(w.temperature<5){
score -= 1;
reason.push("寒すぎる");
}

/* 出席率 */
if(attendanceRate < 80){
score -= 2;
reason.push("出席率が低い");
}

/* 判定 */
let result="";
let cls="";

if(score >= 3){
result = "🎓 行くべき";
cls = "good";
}
else if(score >= 0){
result = "👍 迷う";
cls = "mid";
}
else{
result = "🚫 休んでもOK";
cls = "bad";
}

/* 表示 */
document.getElementById("ai").className = "ai-box " + cls;

document.getElementById("ai").innerHTML =
`<h2>${result}</h2>
<p>理由:</p>
<ul>${reason.map(r=>`<li>${r}</li>`).join("")}</ul>`;

/* 出席率 */
let risk="";

if(attendanceRate >= 85){
risk="安全";
}
else if(attendanceRate >= 75){
risk="注意";
}
else{
risk="単位危険⚠";
}

document.getElementById("attendance").innerHTML =
`出席率: ${attendanceRate}%<br>判定: ${risk}`;

});

}

/* 起動 */
fetchWeather();

</script>

</body>
</html>
