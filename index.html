<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>専修大学周辺お出かけアシスタント</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#eef3f8;
    transition:0.3s;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

button{
    margin:5px;
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#1976d2;
    color:white;
}

.weather{
    background:linear-gradient(135deg,#4facfe,#00c6ff);
    color:white;
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
}

.temp{
    font-size:55px;
    font-weight:bold;
}

.bike{
    font-size:22px;
    margin-top:10px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.ok{color:green;font-weight:bold;}
.warn{color:red;font-weight:bold;}

/* ダークモード */
.dark{
    background:#111;
    color:white;
}
.dark .card{
    background:#222;
    color:white;
}
.dark .weather{
    background:#333;
}
</style>
</head>

<body>

<div class="container">

<h1>🚆 専修大学周辺お出かけアシスタント</h1>

<button onclick="toggleDark()">🌓 ダークモード</button>
<button onclick="refresh()">🔄 更新</button>
<button onclick="getLocation()">📍 現在地</button>
<button onclick="openJR()">🚆 JR</button>
<button onclick="openKeikyu()">🚆 京急</button>

<div id="location">📍 現在地未取得</div>

<div class="weather">
    <h2>🌤 川崎の天気</h2>
    <div id="weather">読み込み中...</div>
    <div id="bike">🚴 判定中...</div>
</div>

<div class="grid">

<div class="card">
<h3>JR東日本</h3>
<p class="ok">平常運転</p>
</div>

<div class="card">
<h3>京急</h3>
<p class="ok">平常運転</p>
</div>

<div class="card">
<h3>東急</h3>
<p class="warn">一部遅延</p>
</div>

<div class="card">
<h3>小田急</h3>
<p class="ok">平常運転</p>
</div>

<div class="card">
<h3>京王</h3>
<p class="ok">平常運転</p>
</div>

</div>

</div>

<script>

const lat = 35.5313;
const lon = 139.6969;

// 天気取得
function fetchWeather(){

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=Asia%2FTokyo`)
.then(r=>r.json())
.then(data=>{

let w = data.current_weather;

document.getElementById("weather").innerHTML =
`<div class="temp">${w.temperature}°C</div>
<p>風速: ${w.windspeed} km/h</p>`;

let msg="";

if(w.weathercode>=61){
msg="🚫 雨で自転車NG";
}
else if(w.windspeed>25){
msg="💨 風が強い";
}
else if(w.temperature>33){
msg="🥵 暑すぎ注意";
}
else{
msg="🚴 自転車OK";
}

document.getElementById("bike").innerHTML = msg;

});
}

// 自動更新
setInterval(fetchWeather,60000);
fetchWeather();

// ダークモード
function toggleDark(){
document.body.classList.toggle("dark");
}

// 更新
function refresh(){
fetchWeather();
}

// 現在地
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
document.getElementById("location").innerHTML =
`📍 ${pos.coords.latitude.toFixed(3)}, ${pos.coords.longitude.toFixed(3)}`;
});
}

// リンク
function openJR(){
window.open("https://traininfo.jreast.co.jp/");
}

function openKeikyu(){
window.open("https://unkou.keikyu.co.jp/");
}

</script>

</body>
</html>
