<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>川崎スマート交通ダッシュボード</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#eef3f8;
    font-family:sans-serif;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.weather{
    background:linear-gradient(135deg,#4facfe,#00c6ff);
    color:white;
    padding:30px;
    border-radius:20px;
    margin-bottom:30px;
}

.temp{
    font-size:60px;
    font-weight:bold;
}

.bike{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:18px;
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.line{
    font-size:24px;
    font-weight:bold;
}

.ok{
    color:green;
    font-weight:bold;
}

.warn{
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🚆 川崎スマート交通ダッシュボード</h1>

<div class="weather">

<h2>🌤 川崎の天気</h2>

<div id="weather">
読み込み中...
</div>

<div class="bike" id="bike">
🚴 判定中...
</div>

</div>

<div class="grid">

<div class="card">
<div class="line">JR東日本</div>
<p class="ok">✅ 平常運転</p>
</div>

<div class="card">
<div class="line">京急線</div>
<p class="ok">✅ 平常運転</p>
</div>

<div class="card">
<div class="line">東急線</div>
<p class="warn">⚠ 一部遅延</p>
</div>

<div class="card">
<div class="line">小田急線</div>
<p class="ok">✅ 平常運転</p>
</div>

<div class="card">
<div class="line">京王線</div>
<p class="ok">✅ 平常運転</p>
</div>

</div>

</div>

<script>

const latitude = 35.5313;
const longitude = 139.6969;

const url =
`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&timezone=Asia%2FTokyo`;

fetch(url)
.then(response => response.json())
.then(data => {

    const weather = data.current_weather;

    document.getElementById("weather").innerHTML = `
        <div class="temp">${weather.temperature}°C</div>
        <p>風速: ${weather.windspeed} km/h</p>
    `;

    let bikeMessage = "";

    if(weather.windspeed > 20){
        bikeMessage = "🚫 風が強いので注意";
    }
    else{
        bikeMessage = "🚴 自転車OK";
    }

    document.getElementById("bike").innerHTML = bikeMessage;

});

</script>

</body>
</html>
